.intro{color:var(--muted);font-size:12px;margin-bottom:14px;line-height:1.6}

// ===== RENDER HELPERS =====
function badge(text, color) { return `<span class="badge" style="background:${color}22;color:${color}">${text}</span>`; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderTimeline(items, prefix) {
  return items.map((it, i) => {
    const c = COLORS[it.type] || MUTED;
    return `<div class="timeline-row">
      <div class="timeline-time"><span>${it.time}</span><div class="timeline-line ${i===items.length-1?'last':''}"></div></div>
      <div class="timeline-card" onclick="toggleCard(this)" style="--c:${c}">
        <div class="timeline-head">
          <span class="emoji">${it.icon}</span>
          <span class="title">${esc(it.activity)}</span>
          ${badge(it.type, c)}
        </div>
        <div class="timeline-detail">${esc(it.detail)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderExpand(items, colorFn) {
  return items.map((it, i) => {
    const c = typeof colorFn === 'function' ? colorFn(i) : colorFn;
    return `<div class="expand" onclick="toggleCard(this)">
      <div class="expand-head">
        ${it.icon ? `<span class="emoji">${it.icon}</span>` : ''}
        <span class="title">${esc(it.title || it.rule || it.tool || it.action || it.project || it.name || '')}</span>
        <span class="toggle">+</span>
      </div>
      <div class="expand-detail">${it.detailHtml || esc(it.detail || it.desc || it.response || '')}</div>
    </div>`;
  }).join('');
}

}

let activeTab = 0;

function initTabs() {

function switchTab(i) {
  activeTab = i;
  currentWeekendDay = 'saturday';
  document.querySelectorAll('.tab-btn').forEach((btn, j) => btn.classList.toggle('active', j === i));
  document.getElementById('content').innerHTML = renderTab(i);
}

function toggleCard(el) {
  el.classList.toggle('open');
  const toggle = el.querySelector('.toggle');
  if (toggle) toggle.textContent = el.classList.contains('open') ? '−' : '+';
}

function switchWeekendDay(day) {
  currentWeekendDay = day;
  document.getElementById('content').innerHTML = renderWeekend();
}
